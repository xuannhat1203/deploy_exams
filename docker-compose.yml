services:
  db:
    image: postgres:16-alpine
    container_name: rikkei_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rikkei_prod
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rikkei_prod"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/rikkei-backend:${IMAGE_TAG:-latest}
    container_name: rikkei_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rikkei_prod
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
    networks:
      - app_net
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/rikkei-frontend:${IMAGE_TAG:-latest}
    container_name: rikkei_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_net
    expose:
      - "80"

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: rikkei_reverse_proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
